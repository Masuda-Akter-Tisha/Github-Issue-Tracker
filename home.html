<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- title + favicon -->
    <title>Home|Page</title>
    <link rel="shortcut icon" href="./assets/fav2.png" type="image/x-icon">

    <!-- tailwind css + DaisyUI -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- integrate google font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

    <!-- font awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- stylesheet -->
    <link rel="stylesheet" href="./style/style.css">
</head>
<body>
    <!-- navbar -->
   <header class="border border-gray-200 px-20 py-4 mb-16">
    <div class="flex flex-col gap-5 md:flex-row justify-between items-center">
        <div class="flex flex-col md:flex-row items-center gap-2">
            <img class="w-[50px]" src="./assets/github-logo.png" alt="">
            <h2 class="text-2xl font-semibold text-[#1F2937]">GitHub Issues Tracker</h2>
        </div>

        <div>
            <div class="join">
    <label class="input rounded-md">
      <i class="fa-brands fa-sistrix text-gray-500"></i> <input  id="search-input" type="text" placeholder="Search issues..." required />
    </label>
    <button id="search-btn" class="btn btn-primary rounded-md ml-2">Search</button>
   </div>
        </div>
    </div>
   </header>

   <main class="w-11/12 mx-auto">
    <!-- tab-section -->
    <div class="p-6 shadow-md border border-gray-100 space-x-2 rounded-lg mb-4">
        <button id="all-btn" class="btn btn-primary">All</button>
        <button id="open-btn" class="btn">Open</button>
        <button id="closed-btn" class="btn">Closed</button>
    </div>

    <!-- Issues count -->
     <div class="p-6 shadow-sm border border-gray-100 space-x-2 rounded-t-lg flex flex-col gap-3 md:flex-row justify-between items-center">
        <div class="flex flex-col text-center md:flex-row md:text-left gap-2 items-center">
            <img src="./assets/Aperture.png" alt="">
            <div>
                <h2 class="text-lg font-semibold text-[#1F2937]"><span id="count-issue">0</span> Issues</h2>
                <p class="text-[#64748B]">Track and manage your project issues</p>
            </div>
        </div>

        <div>
            <i class="fa-solid fa-circle text-[#00A96E] text-sm"></i> <span class="text-[#1F2937 font-medium] mr-2">Open</span>
            <i class="fa-solid fa-circle text-[#A855F7] text-sm"></i> <span class="text-[#1F2937 font-medium]">Closed</span>
        </div>
     </div>

     <!-- Issue card section -->
      <section id="issueCard-container" class="rounded-b-lg border border-gray-200 bg-[#FBFBFB] shadow-lg p-7 grid grid-cols-1 md:grid-cols-4 gap-5 mb-16">
        
      </section>
   </main>

    <script src="./script/home.js"></script>
</body>
</html>
